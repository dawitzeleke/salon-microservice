

server:
  port: 5006
spring:
  application:
    name: payment-service
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/payment?createDatabaseIfNotExist=true
    username: root
    password: Mysql123!
    driver-class-name: com.mysql.cj.jdbc.Driver
spring.jpa.show-sql: true

razorpay:
  api:
    key: "your razorpay api key"
    secret: "your razorpay api secret"

stripe:
  api:
    key: "your stripe api key"
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "http://localhost:8070/eureka/"



